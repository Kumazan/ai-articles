<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 360px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1a1a2e; color: #e0e0e0; }
.header { padding: 16px; background: #16213e; border-bottom: 1px solid #0f3460; }
.header h1 { font-size: 15px; font-weight: 600; color: #fff; }
.header p { font-size: 12px; color: #8899aa; margin-top: 4px; }
.content { padding: 16px; }
.status { padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; line-height: 1.5; }
.status.info { background: #0f3460; color: #a8d8ea; }
.status.success { background: #1b4332; color: #95d5b2; }
.status.error { background: #3d0000; color: #ff6b6b; }
.status.warning { background: #3d2e00; color: #ffd166; }
.count { font-size: 24px; font-weight: 700; color: #e94560; margin: 8px 0; }
.places-preview { max-height: 200px; overflow-y: auto; margin: 8px 0; font-size: 12px; }
.places-preview .place { padding: 6px 8px; border-bottom: 1px solid #16213e; }
.places-preview .place-name { font-weight: 600; color: #fff; }
.places-preview .place-addr { color: #8899aa; margin-top: 2px; }
.btn-group { display: flex; gap: 8px; margin-top: 12px; }
.btn { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-csv { background: #e94560; color: #fff; }
.btn-json { background: #0f3460; color: #a8d8ea; }
.btn-scan { background: #533483; color: #fff; width: 100%; margin-bottom: 8px; }
.tip { font-size: 11px; color: #667; margin-top: 12px; line-height: 1.6; }
</style>
</head>
<body>
<div class="header">
  <h1>Maps List Exporter</h1>
  <p>匯出 Google Maps 儲存的清單</p>
</div>
<div class="content">
  <div id="status" class="status info">先打開 Google Maps 的清單頁面，再按下方按鈕掃描。</div>
  <button class="btn btn-scan" id="btnScan">掃描清單</button>
  <div id="preview" style="display:none;">
    <div class="count" id="count"></div>
    <div class="places-preview" id="placesList"></div>
  </div>
  <div class="btn-group">
    <button class="btn btn-csv" id="btnCsv" disabled>匯出 CSV</button>
    <button class="btn btn-json" id="btnJson" disabled>匯出 JSON</button>
  </div>
  <div class="tip">
    使用方式：<br>
    1. 打開 Google Maps → 你的地點 → 已儲存的清單<br>
    2. 往下捲動直到所有地點載入完畢<br>
    3. 點「掃描清單」→ 匯出
  </div>
</div>
<script src="popup.js"></script>
</body>
</html>
