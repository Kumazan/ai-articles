# Blacklist patterns
blacklist_signals:
  - "每日 AI 新聞 but no sources"
  - "OMG / INSANE / GAME CHANGER in every post"
  - "only quote-tweets, no original content"
  - "course / newsletter / paid community bait"

# Filter rules
filters:
  must_collect:
    - has_external_link
    - is_thread
    - has_code_block
    - has_benchmark_or_data
  auto_skip:
    - pure_opinion_no_evidence
    - emotional_argument
    - non_tech_politics
    - engagement_bait

# Digest settings
digest:
  max_tweets_per_account: 10
  max_age_hours: 48
  translate_mode: key_sentences
  output_lang: zh-tw
