            - paragraph [ref=e70]: Existing systems waste 60-80% of KV cache memory due to fragmentation and over-reservation. This memory waste limits the batch size and consequently the throughput that can be achieved. PagedAttention solves this by allowing continuous keys and values to be stored in non-contiguous memory space, partitioning the KV cache into blocks that can be managed independently.
            - paragraph [ref=e71]: The block table design maps non-contiguous logical blocks to physical blocks, similar to how virtual memory works in operating systems. According to the vLLM documentation, this approach results in near-optimal memory usage with waste of under 4%. The improvement in memory efficiency directly translates to higher batch sizes and better GPU utilization, which explains the throughput gains that vLLM achieves.
            - paragraph [ref=e72]: PagedAttention also enables efficient memory sharing for complex sampling algorithms. In parallel sampling, multiple output sequences are generated from the same prompt, and the computation and memory for the prompt can be shared. The block table naturally supports this by mapping different logical blocks to the same physical block, with reference counting ensuring safe sharing through a copy-on-write mechanism. According to the paper, this reduces memory usage by up to 55% for parallel sampling and beam search.
            - insertion [ref=e74]
            - 'heading "Model Runner V2: The 2026 Architecture Overhaul" [level=2] [ref=e76]'
            - paragraph [ref=e77]:
              - text: March 2026 marked a significant milestone with the release of Model Runner V2 (MRV2), a ground-up re-implementation of the vLLM model runner. According to the
              - link "vLLM blog" [ref=e78] [cursor=pointer]:
                - /url: https://blog.vllm.ai/blog/mrv2
              - text: ", MRV2 delivers a cleaner, more modular, and more efficient execution core with no API changes. The redesign addresses accumulated technical debt as vLLM evolved from a research project to a production system."
            - paragraph [ref=e79]: The MRV2 design is built on three core principles. First, modularity isolates model-specific logic from the common execution path. Second, GPU-native design moves bookkeeping off the CPU and onto the GPU. Third, async-first design treats overlapped CPU/GPU execution as a fundamental constraint rather than a retrofit.
            - insertion [ref=e81]
            - paragraph [ref=e83]: According to the vLLM team, MRV2 achieves a 56% throughput increase on small models by offloading input preparation to the GPU. For speculative decoding, MRV2 delivers 6.3% lower time-per-output-token (TPOT) by eliminating CPU-GPU synchronization points. The improvement comes from the zero-synchronization design that allows GPU-side preparation kernels to directly consume rejection sampling results.
            - paragraph [ref=e84]: The modularization addresses a common complaint from users and contributors. According to the blog post, the existing runner had grown into a single file exceeding 6,700 lines. MRV2 breaks this into smaller files with clearer responsibilities - the largest file is now under 1,300 lines. The new ModelState abstraction defines interfaces for model-specific logic including multimodal embeddings, extra model inputs, attention metadata, and CUDA graph capture.
            - heading "Production Features and Ecosystem Integration" [level=2] [ref=e85]
            - insertion [ref=e87]
            - paragraph [ref=e89]:
              - text: vLLM has evolved beyond its academic roots into a full-featured production inference engine. According to the
              - link "vLLM GitHub README" [ref=e90] [cursor=pointer]:
                - /url: https://github.com/vllm-project/vllm
              - text: ", the engine supports state-of-the-art serving throughput with efficient management of attention key and value memory through PagedAttention, continuous batching of incoming requests, fast model execution with CUDA/HIP graphs, and various quantizations including GPTQ, AWQ, AutoRound, INT4, INT8, and FP8."
            - paragraph [ref=e91]: The framework integrates with popular HuggingFace models seamlessly, supporting transformer-like LLMs like LLaMA, Mixture-of-Expert LLMs like Mixtral and DeepSeek-V2 and V3, embedding models like E5-Mistral, and multimodal LLMs like LLaVA. This broad model support means organizations can switch to vLLM without retraining or converting models.
            - paragraph [ref=e92]: Distributed inference is supported through tensor, pipeline, data, and expert parallelism. The engine provides an OpenAI-compatible API server, making it straightforward to replace closed APIs with self-hosted infrastructure. According to the documentation, vLLM supports NVIDIA GPUs, AMD CPUs and GPUs, Intel CPUs and GPUs, PowerPC CPUs, Arm CPUs, and TPUs, plus hardware plugins for Intel Gaudi, IBM Spyre, and Huawei Ascend.
            - insertion [ref=e94]
            - paragraph [ref=e96]:
              - text: Speculative decoding is another production-critical feature. According to the
              - link "vLLM blog" [ref=e97] [cursor=pointer]:
                - /url: https://blog.vllm.ai/blog/p-eagle
              - text: ", the P-EAGLE implementation provides faster LLM inference with parallel speculative decoding. This technique uses a draft model to predict multiple tokens ahead, which are then verified in parallel by the target model, reducing the number of sequential passes required."
            - heading "Python at the Core" [level=2] [ref=e98]
            - paragraph [ref=e99]: Python remains the primary interface for vLLM, consistent with its roots in the Python-dominated ML ecosystem. According to the documentation, vLLM can be used for both offline inference and online serving through Python APIs. The simple usage pattern makes it accessible to teams already familiar with Python-based ML workflows.
            - code [ref=e101]: "from vllm import LLM # Offline inference example prompts = [\"Hello, my name is\", \"The capital of France is\"] llm = LLM(model=\"meta-llama/Llama-2-7b-hf\") outputs = llm.generate(prompts) for output in outputs: print(output.outputs[0].text)"
            - paragraph [ref=e102]:
              - text: The engine also provides an OpenAI-compatible API server that can be started with a single command. According to the
              - link "vLLM documentation" [ref=e103] [cursor=pointer]:
                - /url: https://docs.vllm.ai
              - text: ", organizations can query the server with standard OpenAI API formats, enablingdrop-in replacement for existing applications that use closed APIs. This backwards compatibility has been critical for enterprise adoption."
            - insertion [ref=e105]
            - heading "The Inference Serving Landscape" [level=2] [ref=e107]
            - paragraph [ref=e108]:
              - text: vLLM operates in a competitive landscape but has established itself as the open source leader. According to industry benchmarks, vLLM consistently delivers 2-4x throughput improvements over naive implementations, making it essential for cost-effective production deployments. The combination of PagedAttention, continuous batching, and modern architecture makes it the preferred choice for teams building production AI systems.
              - link "Aprendizaje automático e inteligencia artificial" [ref=e109] [cursor=pointer]:
                - img [ref=e111]
                - text: Aprendizaje automático e inteligencia artificial
            - paragraph [ref=e113]: The project's development remains active, with 88 releases as of March 2026 and continuous improvements to performance and model support. The vLLM team continues to optimize for new hardware including NVIDIA Blackwell and AMD Instinct, and new model architectures as they emerge. The move to MRV2 demonstrates the project's commitment to long-term technical excellence rather than feature accumulation.
            - insertion [ref=e115]
            - paragraph [ref=e117]: For organizations building production AI systems, vLLM provides a critical piece of infrastructure. The open source nature means teams can inspect, modify, and contribute to the codebase, building confidence in production deployments. The strong community and commercial adoption ensure the project will continue to evolve, making it a safe choice for long-term infrastructure investments.
            - paragraph [ref=e118]: As AI moves from experimentation to production, the infrastructure that powers inference becomes as important as the models themselves. vLLM has established itself as the open source standard for LLM inference, providing the performance, flexibility, and community support that production systems require.
