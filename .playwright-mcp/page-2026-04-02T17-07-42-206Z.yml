            - heading "From Berkeley Research to Production Standard" [level=2] [ref=e54]
            - paragraph [ref=e55]:
              - text: The story of vLLM began in 2023 when researchers at UC Berkeley published their groundbreaking paper
              - link "Efficient Memory Management for Large Language Model Serving with PagedAttention" [ref=e56] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2309.06180
              - text: ". The paper, published at SOSP 2023, introduced PagedAttention - an attention algorithm inspired by virtual memory and paging techniques in operating systems. This innovation addressed one of the most challenging problems in LLM serving: the KV cache memory management that consumes significant GPU resources during autoregressive decoding."
            - paragraph [ref=e57]:
              - text: According to the
              - link "vLLM blog" [ref=e58] [cursor=pointer]:
                - /url: https://blog.vllm.ai/2023/06/20/vllm.html
              - text: ", when vLLM was first released, it achieved up to 24x higher throughput compared to HuggingFace Transformers and up to 3.5x higher throughput than the previous state-of-the-art systems like FasterTransformer and Orca. The improvement was more pronounced with longer sequences, larger models, and more complex decoding algorithms. This dramatic performance improvement caught the attention of the AI community, and vLLM quickly became the default choice for organizations deploying LLMs at scale."
