<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/components.css' | relative_url }}">
<script>
  // Theme outputs viewport without maximum-scale; override it to prevent iOS text zoom
  (function() {
    var vp = document.querySelector('meta[name="viewport"]');
    if (vp) {
      vp.setAttribute('content', 'width=device-width, initial-scale=1, maximum-scale=1');
    }
  })();

  // Auto-generate sticky TOC from h2/h3 headings in article
  document.addEventListener('DOMContentLoaded', function() {
    var section = document.querySelector('section');
    if (!section) return;
    var headings = section.querySelectorAll('h2, h3');
    if (headings.length < 2) return;

    headings.forEach(function(h, i) {
      if (!h.id) h.id = 'section-' + i;
    });

    var nav = document.createElement('nav');
    nav.className = 'article-toc';
    var title = document.createElement('div');
    title.className = 'toc-title';
    title.textContent = '段落導覽';
    nav.appendChild(title);

    var ul = document.createElement('ul');
    headings.forEach(function(h) {
      var li = document.createElement('li');
      if (h.tagName === 'H3') li.className = 'toc-sub';
      var a = document.createElement('a');
      a.href = '#' + h.id;
      a.textContent = h.textContent;
      li.appendChild(a);
      ul.appendChild(li);
    });
    nav.appendChild(ul);

    var header = document.querySelector('header');
    if (header) header.appendChild(nav);


    // Move footer content into sidebar
    var footer = document.querySelector('footer');
    if (footer && header) {
      var sidebarFooter = document.createElement('div');
      sidebarFooter.className = 'sidebar-footer';
      while (footer.firstChild) {
        sidebarFooter.appendChild(footer.firstChild);
      }
      header.appendChild(sidebarFooter);
    }
  });
</script>
